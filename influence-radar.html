<style>
:root{
  --bg:#ffffff;--panel:#f2f4f8;--border:#d0d4e8;--text:#0a0a1a;--dim:#556;
  --bright:#000000;--red:#e03030;--orange:#d97706;--yellow:#b45309;
  --green:#16a34a;--blue:#2563eb;--mono:'Courier New',monospace;
  --fs-base:15px;--fs-sm:13px;--fs-xs:12px;--fs-tiny:11px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--mono);
  min-height:100vh;overflow-x:hidden;font-size:var(--fs-base)}
/* ── HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:200;
  background:#ffffff;border-bottom:2px solid #c0c8e0;
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  height:52px}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--red);
  box-shadow:0 0 8px var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes installPulse{0%,100%{box-shadow:0 0 0 0 #2563eb44}50%{box-shadow:0 0 0 8px #2563eb00}}
.header-title{font-size:13px;letter-spacing:3px;color:#0a0a1a;font-weight:800;text-transform:uppercase;font-weight:700}
.header-time{font-size:12px;color:#2563eb;font-weight:700}
/* ── TAB NAV (상단 스크롤형) */
#nav{position:sticky;top:87px;z-index:190;
  background:#f0f2fa;border-bottom:2px solid #c0c8e0;
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;gap:0}
#nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;display:flex;flex-direction:row;align-items:center;
  justify-content:center;gap:8px;cursor:pointer;border:none;
  background:transparent;color:#1a1a3a;font-size:14px;font-weight:600;
  font-weight:700;letter-spacing:0.5px;transition:all .15s;padding:0 20px;height:48px;
  font-family:var(--mono);border-bottom:3px solid transparent;white-space:nowrap}
.nav-btn.active{color:#1a1a3a;border-bottom-color:#2563eb;background:#e8edf8}
.nav-btn:hover{color:#1a1a3a;background:#e0e6f5}
.nav-btn svg{width:16px;height:16px;stroke-width:1.5;fill:none;stroke:currentColor;flex-shrink:0}
/* ── CONTENT */
#content{min-height:100vh;padding-bottom:20px}
.tab{display:none;padding:16px}
.tab.active{display:block}
/* ── CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:4px;
  padding:12px;margin-bottom:10px}
.card-border-l{border-left-width:3px;border-left-style:solid}
/* ── SECTION TITLE */
.sec{font-size:12px;color:#0a0a1a;letter-spacing:2px;text-transform:uppercase;
  font-weight:800;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #c0c8e0}
/* ── BARS */
.bar-wrap{width:100%;height:3px;background:#d0d4e8;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
/* ── TAGS */
.tag{display:inline-block;font-size:13px;padding:2px 7px;border-radius:2px;
  border:1px solid;white-space:nowrap;font-weight:600}
/* ── FIGURE ROW */
.fig-row{display:flex;align-items:center;gap:10px;padding:12px;
  border-bottom:1px solid #d0d4e8;cursor:pointer;
  border-left:3px solid transparent;transition:background .1s}
.fig-row:hover{background:#e8edf8}
.fig-row.selected{border-left-color:var(--sel-color,var(--blue))}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0}
/* ── GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* ── FORM */
input,select,textarea{background:#ffffff;border:1px solid #b0b8d0;
  color:#0a0a1a;padding:7px 10px;font-size:13px;border-radius:3px;
  font-family:var(--mono);width:100%}
input[type=range]{background:none;border:none;padding:4px 0}
label{font-size:12px;color:#0a0a1a;font-weight:700;display:block;margin-bottom:4px;
  letter-spacing:1px;font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 16px;border-radius:3px;font-size:12px;cursor:pointer;
  font-family:var(--mono);letter-spacing:1px;border:1px solid;transition:background .1s}
.btn-blue{border-color:var(--blue);background:#eff4ff;color:var(--blue)}
.btn-green{border-color:var(--green);background:#f0fdf4;color:var(--green)}
.btn-red{border-color:var(--red);background:#fff0f0;color:var(--red)}
/* ── ALERT BADGE */
.alert-badge{position:absolute;top:-4px;right:-4px;background:var(--red);
  color:#ffffff;font-weight:700;font-size:12px;text-shadow:0 0 3px rgba(0,0,0,0.4);width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center}
/* ── NOTIF PANEL */
#notif-panel{position:fixed;top:52px;left:0;right:0;z-index:500;
  max-height:75vh;overflow-y:auto;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);border-bottom:2px solid #c0c8e0}
.notif-item{padding:10px 16px;background:#fffbf0;border-bottom:1px solid #fcd34d55;
  display:flex;gap:10px;align-items:flex-start;font-size:12px}
/* ── SCORE BIG */
.score-big{font-size:28px;font-weight:bold;font-family:var(--mono);line-height:1}
/* ── PURE EFFECT */
.pure-effect{padding:8px 10px;border-radius:3px;background:#eef0f8;margin-top:6px}
/* ── MOBILE DETAIL SHEET */
#detail-sheet{position:fixed;bottom:58px;left:0;right:0;background:var(--panel);
  border-top:1px solid var(--border);z-index:100;
  max-height:70vh;overflow-y:auto;transform:translateY(100%);
  transition:transform .3s ease;border-radius:12px 12px 0 0}
#detail-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;
  margin:10px auto 0}
/* ── TEMP COLORS */
.temp-hot{color:#dc2626}.temp-warm{color:#ea580c}.temp-cool{color:#b45309}.temp-cold{color:var(--blue)}
/* ── OPP COLORS */
.opp-red{color:#dc2626}.opp-orange{color:#d97706}.opp-yellow{color:#b45309}.opp-grey{color:#778}
/* ── RESPONSIVE DESKTOP */
@media(min-width:768px){
  .grid2{grid-template-columns:repeat(3,1fr)}
  .nav-btn{font-size:12px;padding:0 22px;height:46px}
}
#tab-nav-desktop{display:none}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js';
import { getMessaging, getToken, onMessage }
  from 'https://www.gstatic.com/firebasejs/11.5.0/firebase-messaging.js';

const firebaseConfig = {
  apiKey: "AIzaSyAl9w26mpnGSTHe-lHBtRFWkIv3tRbA0p8",
  authDomain: "influence-radar-43a48.firebaseapp.com",
  projectId: "influence-radar-43a48",
  storageBucket: "influence-radar-43a48.firebasestorage.app",
  messagingSenderId: "1008784285984",
  appId: "1:1008784285984:web:788217edf21b10eb6e3745",
  measurementId: "G-61HY2F2WD8"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── Firestore 저장 (save() 호출 시 자동 동기화)
window.fbSave = async function(data) {
  try {
    await setDoc(doc(db,'radar','main'), {
      logs: data.logs || [],
      alerts: (data.alerts||[]).slice(0,100),
      learnData: data.learnData || {},
      signalLog: (data.signalLog||[]).slice(0,500),
      trades: (data.trades||[]).slice(0,200),
      updatedAt: serverTimestamp(),
    }, {merge:true});
  } catch(e) { console.warn('FB save error:', e); }
};

// ── Firestore 불러오기
window.fbLoad = async function() {
  try {
    const snap = await getDoc(doc(db,'radar','main'));
    if(snap.exists()) return snap.data();
  } catch(e) { console.warn('FB load error:', e); }
  return null;
};

// ── 실시간 동기화 (다른 기기에서 변경 시 자동 반영)
window.fbListen = function(callback) {
  return onSnapshot(doc(db,'radar','main'), (snap) => {
    if(snap.exists()) callback(snap.data());
  });
};

// ── FCM VAPID 키
const VAPID_KEY = 'BAR--UDhhWLNMM11VJVrkIkMvLHzH5nFgQoqfEkaOPtXjQrwmZkisECFzIKpZ3yZhX9sbaiV3HhbTM_i5MwGTfw';

// ── FCM 푸시 알림
window.fbInitFCM = async function() {
  try {
    const messaging = getMessaging(fbApp);
    const token = await getToken(messaging, {vapidKey: VAPID_KEY});
    localStorage.setItem('ir_fcm_token', token);
    console.log('✅ FCM Token 발급 완료');

    // 포그라운드 메시지 수신
    onMessage(messaging, (payload) => {
      const {title, body} = payload.notification || {};
      if(title && window.pushNotif) {
        window.pushNotif(title, body||'', 70, '');
      }
    });

    // FB 상태 업데이트
    const fbSt = document.getElementById('fb-status');
    if(fbSt) { fbSt.textContent = '🔥 FB+FCM 완료'; fbSt.style.color = '#16a34a'; }
    return token;
  } catch(e) {
    console.warn('FCM init error:', e);
    return null;
  }
};

// 전역 노출
window.db = db;
window.fbReady = true;
console.log('✅ Firebase 연결 완료');
</script>

// 패턴 기반 영향력 점수 보정
function applyPatternBonus(fig) {
  const p = PATTERNS[fig.id];
  if(!p) return fig.inf;
  return Math.min(100, fig.inf + (p.patternBonus||0));
}

// 패턴 신호강도 계산 (최근 로그와 패턴 매칭)
function calcPatternStrength(figId) {
  const p = PATTERNS[figId];
  if(!p) return 0;
  const recentLogs = state.logs.filter(l=>l.figId===figId).slice(0,5);
  const matchCount = recentLogs.filter(l=>
    p.signaturePatterns.some(sp=>Math.abs(l.drop - sp.avgDropPct) < 5)
  ).length;
  return Math.min(100, p.patternScore + matchCount*3);
}

// ── Yahoo Finance 실시간 현재가 (allorigins 프록시 우회)
async function fetchLivePrices(tickers) {
  const symbols = tickers.join(',');
  try {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketChange`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    if(!res.ok) return {};
    const data = await res.json();
    const result = {};
    (data?.quoteResponse?.result || []).forEach(q => {
      if(q.regularMarketPrice) {
        result[q.symbol] = {
          price: Math.round(q.regularMarketPrice * 100) / 100,
          change: Math.round((q.regularMarketChange||0) * 100) / 100,
          changePct: Math.round((q.regularMarketChangePercent||0) * 100) / 100,
        };
      }
    });
    return result;
  } catch(e) {
    return {};
  }
}

// ── 전체 종목 현재가 업데이트 (15분마다)
async function updateAllPrices() {
  const now = Date.now();
  const lastUpdate = priceUpdatedAt ? parseInt(priceUpdatedAt) : 0;
  if(now - lastUpdate < 15*60*1000) return; // 15분 이내면 스킵

  const allTickers = Object.keys(PRICES);
  // 한번에 20개씩 분할 요청
  const chunks = [];
  for(let i=0; i<allTickers.length; i+=20) chunks.push(allTickers.slice(i,i+20));

  for(const chunk of chunks) {
    const result = await fetchLivePrices(chunk);
    Object.assign(livePrices, result);
    // PRICES 테이블도 업데이트
    Object.entries(result).forEach(([sym, data]) => {
      PRICES[sym] = data.price;
    });
  }

  if(Object.keys(livePrices).length > 0) {
    localStorage.setItem('ir_live_prices', JSON.stringify(livePrices));
    localStorage.setItem('ir_price_updated', String(now));
    priceUpdatedAt = String(now);
    const t = new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'});
    const txt = document.getElementById('news-status-txt');
    if(txt) txt.title = `현재가 마지막 업데이트: ${t}`;
    console.log(`✅ 현재가 업데이트: ${Object.keys(livePrices).length}개 종목 (${t})`);
  }
}

// ── 단일 종목 현재가 즉시 조회
async function getLivePrice(ticker) {
  const cached = livePrices[ticker];
  const lastUpdate = priceUpdatedAt ? parseInt(priceUpdatedAt) : 0;
  if(cached && Date.now() - lastUpdate < 15*60*1000) return cached;

  const result = await fetchLivePrices([ticker]);
  if(result[ticker]) {
    livePrices[ticker] = result[ticker];
    PRICES[ticker] = result[ticker].price;
    localStorage.setItem('ir_live_prices', JSON.stringify(livePrices));
    return result[ticker];
  }
  return { price: PRICES[ticker]||0, change:0, changePct:0 };
}

function fmtPrice(ticker) {
  const live = livePrices[ticker];
  const price = live?.price || PRICES[ticker] || 0;
  const change = live?.changePct || 0;
  const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '';
  const color = change > 0 ? '#16a34a' : change < 0 ? '#dc2626' : '#556677';
  return {price, change, arrow, color, isLive: !!live};
}

// 매입 시뮬 계산
function calcBuy(ticker, dropPct, budget) {
  const price = PRICES[ticker] || 100;
  const dropPrice = Math.round(price * (1 - dropPct/100) * 100) / 100;  // 급락 후 예상가
  const shares = Math.floor(budget / dropPrice);                          // 매입 가능 주수
  const totalCost = Math.round(shares * dropPrice * 100) / 100;           // 실제 투자금
  const recoveryVal = Math.round(shares * price * 100) / 100;             // 회복 시 가치
  const profit = Math.round((recoveryVal - totalCost) * 100) / 100;       // 예상 수익
  const profitPct = Math.round((profit / totalCost) * 1000) / 10;         // 수익률
  return { price, dropPrice, shares, totalCost, recoveryVal, profit, profitPct };
}

function fmtUSD(n) {
  if(n>=1000000) return '$'+(n/1000000).toFixed(2)+'M';
  if(n>=1000) return '$'+(n/1000).toFixed(1)+'K';
  return '$'+n.toFixed(2);
}

// 발언 순수 효과 계산 (발언 충격 - 시장 등락 - 섹터 등락 평균)
function pureEffect(log){
  if(log.drop<=0) return null; // 상승 발언은 순수효과 없음
  const pe = log.drop - (log.spDrop||0) - ((log.sectorDrop||0)*0.3);
  return Math.round(pe*10)/10;
}
function peLabel(pe){
  if(pe===null) return null;
  if(pe>=8) return {text:'발언 단독효과 높음',color:'#ff4444'};
  if(pe>=4) return {text:'발언+시장 혼합',color:'#ff8c00'};
  if(pe>=1) return {text:'발언 효과 미미',color:'#fbbf24'};
  return {text:'시장 흐름 탓 (발언 무관)',color:'#2563eb'};
}

function figStats(figId){
  const fl = state.logs.filter(l=>l.figId===figId && l.drop>0);
  if(!fl.length) return {avgDrop:0,avgRecovery:0,avgPureEffect:0,hitCount:0};
  const pes = fl.map(l=>pureEffect(l)).filter(x=>x!==null);
  return {
    avgDrop: Math.round(fl.reduce((s,l)=>s+l.drop,0)/fl.length*10)/10,
    avgRecovery: Math.round(fl.reduce((s,l)=>s+l.recovery,0)/fl.length),
    avgPureEffect: pes.length ? Math.round(pes.reduce((s,x)=>s+x,0)/pes.length*10)/10 : 0,
    hitCount: fl.length,
  };
}

function getSortedFigs(){
  return [...state.figs].map(fig=>{
    const fl = state.logs.filter(l=>l.figId===fig.id && l.drop<2);
    const decayed = Math.max(fig.base - fl.length*2, Math.round(fig.base*0.7));
    return {...fig, inf: decayed};
  }).sort((a,b)=>b.inf-a.inf);
}

  const patTrust = (pat?.patternScore||70) / 100;          // 패턴 신뢰도 (0~1)

// 알림 패널에서 시그널 상세 팝업 재열기
async function reopenSignalDetail(idx) {
  // signalLog 먼저, 없으면 state.alerts에서 찾기
  const a = signalLog[idx] || state.alerts[idx];
  if(!a||!a.figureId) return;
  const fig = state.figs.find(f=>f.id===a.figureId);
  if(!fig) return;
  await showSignalDetail(
    fig,
    {title:a.title, titleOrig:a.titleOrig||a.title},
    a.sectors||[],
    a.tickers||a.topTickers||'',
    a.score||a.maxScore||50
  );
}

const SIGNAL_LEVELS = {
  CRITICAL:{emoji:'🔴',label:'즉시포착',color:'#ff4444',bg:'#1a0505',border:'#ff444466',vibrate:[200,100,200,100,200]},
  HIGH:    {emoji:'🟠',label:'유망 시그널',color:'#ff8c00',bg:'#140a00',border:'#ff8c0044',vibrate:[200,100,200]},
  MEDIUM:  {emoji:'🟡',label:'관찰',color:'#fbbf24',bg:'#0f0e00',border:'#fbbf2433',vibrate:[100]},
  INFO:    {emoji:'📡',label:'뉴스',color:'#2563eb',bg:'#ffffff',border:'#4a9eff22',vibrate:[50]},
};
function getSignalLevel(s){return s>=70?'CRITICAL':s>=45?'HIGH':s>=25?'MEDIUM':'INFO';}

// ── 인앱 배너 큐
let signalQueue=[], signalShowing=false;
function showSignalBanner(level,title,body,tickers){
  signalQueue.push({level,lv:SIGNAL_LEVELS[level],title,body,tickers});
  if(!signalShowing) processSignalQueue();
}
function processSignalQueue(){
  if(!signalQueue.length){signalShowing=false;return;}
  signalShowing=true;
  const sig=signalQueue.shift();
  const lv=sig.lv;
  document.getElementById('signal-banner')?.remove();
  const banner=document.createElement('div');
  banner.id='signal-banner';
  banner.style.cssText=`position:fixed;top:140px;left:10px;right:10px;z-index:999;
    background:${lv.bg};border:2px solid ${lv.border};border-left:5px solid ${lv.color};
    border-radius:6px;padding:12px 14px;box-shadow:0 4px 24px ${lv.color}55;`;
  banner.innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:10px">
      <span style="font-size:22px;flex-shrink:0">${lv.emoji}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap">
          <span style="font-size:12px;font-weight:bold;color:${lv.color};font-family:var(--mono)">${lv.label}</span>
          ${sig.tickers?sig.tickers.split('·').map(t=>`<span style="font-size:13px;padding:2px 8px;
            background:#eff4ff;border:1px solid #4a9eff55;color:#2563eb;
            border-radius:3px;font-family:var(--mono);font-weight:bold">${t}</span>`).join(''):''}
        </div>
        <div style="font-size:12px;color:#1a2340;font-family:sans-serif;line-height:1.5;margin-bottom:4px">${sig.title}</div>
        <div style="font-size:13px;color:#556677;font-family:sans-serif">${sig.body}</div>
      </div>
      <button onclick="document.getElementById('signal-banner').remove();processSignalQueue()"
        style="background:none;border:none;color:#666;cursor:pointer;font-size:18px;padding:0">✕</button>
    </div>`;
  document.body.appendChild(banner);
  if(navigator.vibrate&&lv.vibrate) navigator.vibrate(lv.vibrate);
  const ms=sig.level==='CRITICAL'?8000:sig.level==='HIGH'?5000:3000;
  setTimeout(()=>{banner.style.opacity='0';banner.style.transition='opacity .3s';
    setTimeout(()=>{banner.remove();processSignalQueue();},300);},ms);
}

function pushNotif(title, body, score=0, tickers=''){
  const level = score>0?getSignalLevel(score):'INFO';
  const lv = SIGNAL_LEVELS[level];
  const alertItem={id:Date.now(),title,body,level,score,tickers,
    color:lv.color,emoji:lv.emoji,label:lv.label,
    time:new Date().toLocaleTimeString('ko-KR',{hour12:false}),read:false};
  state.alerts.unshift(alertItem);
  if(state.alerts.length>100) state.alerts=state.alerts.slice(0,100);
  save();
  updateNotifBadge();
  renderNotifPanel();
  if(score>=25) showSignalBanner(level,title,body,tickers);
  if(notifPermission&&(document.hidden||score>=45)){
    new Notification(`${lv.emoji} ${lv.label}`,{
      body: tickers ? `${title} | 관련 종목: ${tickers}` : title,
      tag:level, requireInteraction:level==='CRITICAL',
    });
  }
}

function updateNotifBadge(){
  const unread=state.alerts.filter(a=>!a.read).length;
  const badge=document.getElementById('notif-count');
  if(unread>0){badge.style.display='flex';badge.textContent=unread>9?'9+':unread;}
  else badge.style.display='none';
}

function closeSheet(){
  const sheet = document.getElementById('detail-sheet');
  if(sheet) sheet.classList.remove('open');
}

function toggleNotif(){
  state.notifOpen = !state.notifOpen;
  state.alerts.forEach(a=>a.read=true);
  save();
  updateNotifBadge();
  const panel = document.getElementById('notif-panel');
  panel.style.display = state.notifOpen?'block':'none';
  renderNotifPanel();
}

      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;font-weight:bold;color:#1a2340;font-family:var(--mono)">
          🔔 알림 ${allAlerts.length}건

// ── IndexedDB 이중 백업 시스템 (localStorage 소실 대비)
const IDB_NAME = 'influence-radar-db';
const IDB_STORE = 'signalLog';
let idbReady = false;
let idb = null;

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(IDB_STORE, { keyPath: 'id' });
    };
    req.onsuccess = e => {
      idb = e.target.result;
      idbReady = true;
      resolve(idb);
    };
    req.onerror = () => reject(req.error);
  });
}

function idbSaveSignalLog(log) {
  if (!idbReady || !idb) return;
  try {
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    const store = tx.objectStore(IDB_STORE);
    store.clear();
    log.forEach(item => {
      const safe = {...item};
      if (!safe.id) safe.id = String(Date.now()) + Math.random();
      store.put(safe);
    });
  } catch(e) { console.warn('[IDB] save error', e); }
}

function idbLoadSignalLog() {
  return new Promise((resolve) => {
    if (!idbReady || !idb) return resolve([]);
    try {
      const tx = idb.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    } catch(e) { resolve([]); }
  });
}

// ── 예측 결과 저장 + 학습 반영
function recordStudyResult(alert, accResult) {
  if(!alert.prediction||!accResult?.isPast||accResult.noData) return;
  const pred = alert.prediction;

  // 이미 저장된 결과면 스킵
  const alreadyRecorded = learnData.studyResults.find(r=>r.signalId===pred.id);
  if(alreadyRecorded) return;

  const signalDate = new Date(alert.id||Date.now());
  const expectedDate = new Date(pred.expectedDate);
  const now = new Date();

  // 실현 추정: 적중한 종목이 있으면 기일 내 실현으로 간주
  const hitTickers = (accResult.results||[]).filter(r=>r.hit);
  const realized = hitTickers.length > 0;

  // 실현 기일 추정 (적중 시 예상 기일의 중간점으로 추정)
  const estimatedRealDate = realized
    ? new Date(signalDate.getTime() + (expectedDate-signalDate)*0.6)
    : null;
  const timingDiff = estimatedRealDate
    ? Math.round((expectedDate-estimatedRealDate)/(1000*60*60*24))
    : null; // 양수 = 예상보다 빠름, 음수 = 늦음

  // 평균 하락폭 오차
  const avgPredError = accResult.results?.length>0
    ? accResult.results.reduce((s,r)=>s+Math.abs(r.actualChange-r.predicted),0)/accResult.results.length
    : null;

  const result = {
    signalId: pred.id||Date.now(),
    figureId: pred.figureId,
    figureName: pred.figureName,
    tickers: pred.tickers,
    sectors: alert.sectors||[],
    signalDate: signalDate.toISOString(),
    expectedDate: pred.expectedDate,
    predictedDrop: pred.avgDrop,
    predictedDays: pred.recoveryDays,
    predProb: pred.prob,
    hitRate: accResult.hitRate,
    hitCount: accResult.hitCount,
    totalCases: accResult.total,
    realized,
    timingDiff,
    avgPredError,
    results: accResult.results,
    recordedAt: now.toISOString(),
  };

  learnData.studyResults.unshift(result);
  if(learnData.studyResults.length>200) learnData.studyResults=learnData.studyResults.slice(0,200);

  // ── 학습 통계 갱신
  const ss = learnData.studyStats;
  ss.totalPredictions++;
  ss.totalHits += result.hitCount||0;
  ss.totalCases += result.totalCases||0;

  // 인물별 적중률 업데이트
  if(pred.figureId) {
    if(!ss.figAccuracy[pred.figureId]) ss.figAccuracy[pred.figureId]={hits:0,cases:0};
    ss.figAccuracy[pred.figureId].hits += result.hitCount||0;
    ss.figAccuracy[pred.figureId].cases += result.totalCases||0;
  }

  // 섹터별 적중률 업데이트
  (alert.sectors||[]).forEach(sec=>{
    if(!ss.sectorAccuracy[sec]) ss.sectorAccuracy[sec]={hits:0,cases:0};
    ss.sectorAccuracy[sec].hits += result.hitCount||0;
    ss.sectorAccuracy[sec].cases += result.totalCases||0;
  });

  // 예상확률 보정값 업데이트 (실제 - 예상 평균)
  const actualRate = ss.totalCases>0 ? ss.totalHits/ss.totalCases*100 : 0;
  const allProbs = learnData.studyResults.filter(r=>r.predProb).map(r=>r.predProb);
  const avgProb = allProbs.length>0 ? allProbs.reduce((s,v)=>s+v,0)/allProbs.length : 0;
  ss.probCalibration = Math.round(actualRate - avgProb); // 실제가 더 높으면 양수

  // 오차 평균 갱신
  const errList = learnData.studyResults.filter(r=>r.avgPredError!=null).map(r=>r.avgPredError);
  if(errList.length>0) ss.avgPredError = Math.round(errList.reduce((s,v)=>s+v,0)/errList.length*10)/10;
  const timeList = learnData.studyResults.filter(r=>r.timingDiff!=null).map(r=>r.timingDiff);
  if(timeList.length>0) ss.avgTimingError = Math.round(timeList.reduce((s,v)=>s+v,0)/timeList.length*10)/10;

  saveLearn();
  console.log(`✅ 학습 결과 저장: ${result.figureName} 적중률 ${result.hitRate}%`);
}

// Yahoo Finance 특정 날짜 종가 조회
async function getHistoricalPrice(ticker, targetDate) {
  try {
    const d = new Date(targetDate);
    // 주말이면 다음 월요일로 보정
    const dow = d.getDay();
    if(dow === 6) d.setDate(d.getDate() + 2);
    if(dow === 0) d.setDate(d.getDate() + 1);
    const p1 = Math.floor(d.getTime() / 1000) - 3600;
    const p2 = p1 + 86400 * 3; // 3일 범위로 안전마진
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&period1=${p1}&period2=${p2}`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy, {signal: AbortSignal.timeout(8000)});
    const json = await res.json();
    const closes = json?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
    if(!closes?.length) return null;
    const validCloses = closes.filter(v => v != null);
    if(!validCloses.length) return null;
    return Math.round(validCloses[0] * 100) / 100;
  } catch(e) {
    return null;
  }
}

// 실제 결과에서 인물×섹터별 평균 급락폭 도출
function getLearnedAvgDrop(figId, sectors) {
  const results = learnData.studyResults || [];
  const relevant = results.filter(r => {
    const figMatch = r.figureId === figId;
    const secMatch = sectors?.some(s => r.sectors?.includes(s));
    return figMatch || secMatch;
  });
  if(relevant.length < 3) return null; // 데이터 부족
  const drops = relevant
    .flatMap(r => r.results || [])
    .map(r => r.actualChange)
    .filter(v => v != null && v < 0);
  if(drops.length < 3) return null;
  const avg = drops.reduce((s,v) => s + Math.abs(v), 0) / drops.length;
  return Math.round(avg * 10) / 10;
}

// 자동 결과 추적 메인 함수
let autoTrackRunning = false;
async function autoTrackResults(silent = false) {
  if(autoTrackRunning) return;
  autoTrackRunning = true;

  const now = new Date();
  // 기일 지났고 priceAtResult 없는 시그널만
  const targets = signalLog.filter(a => {
    if(!a.prediction?.expectedDate) return false;
    if(a.prediction?.priceAtResult) return false; // 이미 추적 완료
    const alreadyRecorded = learnData.studyResults?.find(r => r.signalId === a.prediction?.id);
    if(alreadyRecorded) return false;
    return new Date(a.prediction.expectedDate) < now;
  }).slice(0, 10); // 1회 최대 10건

  if(targets.length === 0) { autoTrackRunning = false; return; }

  if(!silent) {
    const el = document.getElementById('autotrack-status');
    if(el) el.textContent = `🔄 결과 자동 추적 중... (${targets.length}건)`;
  }

  let tracked = 0;
  for(const alert of targets) {
    const pred = alert.prediction;
    if(!pred?.tickers?.length) continue;

    const resultPrices = {};
    for(const ticker of pred.tickers.slice(0, 3)) {
      const price = await getHistoricalPrice(ticker, pred.expectedDate);
      if(price) resultPrices[ticker] = price;
      await new Promise(r => setTimeout(r, 300)); // rate limit 방지
    }

    if(!Object.keys(resultPrices).length) continue;

    // priceAtResult 저장
    pred.priceAtResult = resultPrices;
    pred.trackedAt = now.toISOString();

    // 정확도 계산
    const results = pred.tickers.map(t => {
      const signalPrice = pred.priceAtSignal?.[t] || 0;
      const resultPrice = resultPrices[t] || 0;
      if(!signalPrice || !resultPrice) return null;
      const actualChange = Math.round((resultPrice - signalPrice) / signalPrice * 1000) / 10;
      const predicted = -(pred.avgDrop || 10);
      const sameDir = (actualChange < 0 && predicted < 0) || (actualChange > 0 && predicted > 0);
      const hit = sameDir && Math.abs(actualChange - predicted) <= Math.abs(predicted) * 0.6;
      return { t, signalPrice, resultPrice, actualChange, predicted, hit };
    }).filter(Boolean);

    if(!results.length) continue;

    const hitCount = results.filter(r => r.hit).length;
    const hitRate = Math.round(hitCount / results.length * 100);
    const accResult = { isPast: true, results, hitCount, hitRate, total: results.length };

    recordStudyResult(alert, accResult);
    tracked++;

    // signalLog 갱신 (priceAtResult 영구 저장)
    saveSignalLog();
  }

  autoTrackRunning = false;

  const el = document.getElementById('autotrack-status');
  if(el) {
    el.textContent = tracked > 0
      ? `✅ ${tracked}건 결과 자동 학습 완료 (${new Date().toLocaleTimeString('ko-KR')})`
      : `✅ 추적 완료 — 신규 결과 없음`;
    setTimeout(() => { if(el) el.textContent = ''; }, 5000);
  }

  if(tracked > 0 && typeof renderSim === 'function') renderSim();
  if(tracked > 0) console.log(`[AutoTrack] ${tracked}건 결과 자동 기록 완료`);
}

// ── 학습 보정값을 확률 계산에 반영
function getLearnedProbBonus(figId, sectors) {
  const ss = learnData.studyStats;
  let bonus = 0;

  // 전체 보정 (실제vs예상 차이)
  bonus += (ss.probCalibration||0) * 0.3;

  // 인물별 보정
  const fa = ss.figAccuracy[figId];
  if(fa?.cases>=3) {
    const figRate = fa.hits/fa.cases*100;
    bonus += (figRate-70) * 0.2; // 70% 기준 초과/미달 보정
  }

  // 섹터별 보정
  sectors.forEach(sec=>{
    const sa = ss.sectorAccuracy[sec];
    if(sa?.cases>=2) {
      const secRate = sa.hits/sa.cases*100;
      bonus += (secRate-70) * 0.1;
    }
  });

  return Math.round(Math.max(-20, Math.min(20, bonus)));
}

// ── 학습 엔진 — 뉴스 분석 후 패턴 점수 자동 보정
function learnFromNews(figId, article, sentimentScore, sectors){
  if(!learnData.figStats[figId]) learnData.figStats[figId] = {
    totalNews:0, negCount:0, posCount:0, sectorHits:{}, avgSentiment:0, lastSeen:null
  };
  const fs = learnData.figStats[figId];
  fs.totalNews++;
  fs.lastSeen = new Date().toISOString();
  if(sentimentScore < 0) fs.negCount++;
  else if(sentimentScore > 0) fs.posCount++;
  fs.avgSentiment = ((fs.avgSentiment * (fs.totalNews-1)) + sentimentScore) / fs.totalNews;

  sectors.forEach(sec=>{
    fs.sectorHits[sec] = (fs.sectorHits[sec]||0)+1;
  });

  // 섹터 통계
  sectors.forEach(sec=>{
    if(!learnData.sectorStats[sec]) learnData.sectorStats[sec]={hits:0,negHits:0};
    learnData.sectorStats[sec].hits++;
    if(sentimentScore<0) learnData.sectorStats[sec].negHits++;
  });

  learnData.newsCount++;
  learnData.lastUpdated = new Date().toISOString();

  // 자동 점수 보정 — 부정 뉴스 많을수록 영향력 점수 +, 조작 의심도 반영
  const negRatio = fs.negCount / Math.max(fs.totalNews,1);
  const bonus = Math.min(5, Math.round(negRatio * 10)); // 최대 +5점 보정
  learnData.patternAdjust[figId] = bonus;

  // 영향력 점수 실시간 반영
  const fig = state.figs.find(f=>f.id===figId);
  if(fig) {
    fig.inf = Math.min(100, fig.base + bonus + (PATTERNS[figId]?.patternBonus||0));
  }

  saveLearn();
}

// ── 감성 분석 (간단 규칙 기반)
function analyzeSentiment(text){
  const t = text.toLowerCase();
  let score = 0;
  NEG_WORDS.forEach(w=>{ if(t.includes(w)) score -= 1; });
  POS_WORDS.forEach(w=>{ if(t.includes(w)) score += 1; });
  return score;
}

// ── Currents API (실시간, CORS 허용, 20건/일)
async function fetchCurrents(query) {
  try {
    const url = `${CURRENTS_URL}?keywords=${encodeURIComponent(query)}&language=en&apiKey=${CURRENTS_KEY}`;
    const res = await fetch(url);
    if(!res.ok) return [];
    const data = await res.json();
    return (data.news||[]).map(a=>({
      title: a.title,
      description: a.description,
      url: a.url,
      publishedAt: a.published,
      source: {name: a.author||'Currents'},
      apiSource: 'Currents',
    }));
  } catch(e) { return []; }
}

// ── GNews API (12시간 지연, CORS 차단 → 프록시 우회 시도)
async function fetchGNewsAPI(query, fromDate=null, toDate=null) {
  try {
    let url = `${GNEWS_URL}?q=${encodeURIComponent(query)}&lang=en&max=10&apikey=${GNEWS_KEY}`;
    if(fromDate) url += `&from=${fromDate}`;
    if(toDate) url += `&to=${toDate}`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    if(!res.ok) return [];
    const data = await res.json();
    return (data.articles||[]).map(a=>({
      title: a.title,
      description: a.description,
      url: a.url,
      publishedAt: a.publishedAt,
      source: {name: a.source?.name||'GNews'},
      apiSource: 'GNews',
    }));
  } catch(e) { return []; }
}

// ── 백데이터 수집 (과거 1달 실제 뉴스)
let backfillRunning = false;

async function runBackfill() {
  if(backfillRunning) return;
  backfillRunning = true;

  const btn = document.getElementById('backfill-btn');
  const prog = document.getElementById('backfill-prog');
  if(btn) { btn.disabled=true; btn.textContent='수집 중...'; }

  // 과거 30일을 7일씩 4구간으로 분할
  const now = new Date();
  const weeks = [
    [28,21], [21,14], [14,7], [7,0]
  ].map(([a,b])=>[
    new Date(now-a*86400000).toISOString().split('T')[0],
    new Date(now-b*86400000).toISOString().split('T')[0],
  ]);

  // 인물 키워드 (실제 뉴스에서 잘 걸리는 키워드)
  const backfillQueries = [
    {figId:1, q:'Trump tariff trade policy'},
    {figId:1, q:'Trump stock market economy'},
    {figId:2, q:'Elon Musk Tesla xAI'},
    {figId:2, q:'Musk DOGE government'},
    {figId:3, q:'Federal Reserve interest rate Powell'},
    {figId:4, q:'China semiconductor trade Xi'},
    {figId:5, q:'Nvidia Jensen Huang AI chip'},
    {figId:6, q:'Buffett Berkshire investment'},
  ];

  let totalFetched = 0;
  let totalNew = 0;

  for(let wi=0; wi<weeks.length; wi++) {
    const [from, to] = weeks[wi];
    if(prog) prog.textContent = `${wi+1}/4주차 수집 중... (${from} ~ ${to})`;

    for(const {figId, q} of backfillQueries) {
      const articles = await fetchGNewsAPI(q, from+'T00:00:00Z', to+'T23:59:59Z');
      totalFetched += articles.length;

      const fig = state.figs.find(f=>f.id===figId);
      if(!fig) continue;

      for(const art of articles.slice(0,3)) {
        // 실제 URL만 처리 (데모 완전 차단)
        if(!art.url || art.url==='#' || !art.url.startsWith('http')) continue;
        // 중복 체크
        if(signalLog.find(s=>s.url===art.url)) continue;
        if(state.alerts.find(a=>a.url===art.url)) continue;

        const combined = (art.title||'')+' '+(art.description||'');
        const sentiment = analyzeSentiment(combined);
        const combined_low = combined.toLowerCase();

        const affectedSectors = Object.entries(SECTOR_KEYWORDS)
          .filter(([,kws])=>kws.some(kw=>combined_low.includes(kw.toLowerCase())))
          .map(([sec])=>sec);

        const estDrop = sentiment<0?10:4;
        const oppScores = affectedSectors.flatMap(sec=>{
          const sd=SM[sec]; if(!sd) return [];
          return sd.d.map(s=>({ticker:s.t,score:opp(fig.inf,s.f,estDrop)}));
        }).sort((a,b)=>b.score-a.score);

        const topTickers = oppScores.filter(x=>x.score>=45).map(x=>x.ticker).slice(0,3).join('·');
        const maxScore = oppScores[0]?.score||0;
        if(maxScore<25) continue; // 25점 미만 제외

        const titleKO = await translateKO(art.title||'');

        learnFromNews(figId, art, sentiment, affectedSectors);

        const alertObj = {
          id: new Date(art.publishedAt).getTime()+Math.random(),
          figureId: figId, figureName: fig.name,
          figureColor: fig.color, figureAvatar: fig.avatar,
          title: titleKO, titleOrig: art.title,
          source: art.source?.name||'GNews',
          url: art.url, publishedAt: art.publishedAt,
          sectors: affectedSectors, topTickers,
          tickers: topTickers,
          maxScore, score: maxScore, sentiment,
          sentimentLabel: sentiment<-1?'🔴 부정':sentiment>1?'🟢 긍정':'🟡 중립',
          apiTag: 'GNews',
          time: new Date(art.publishedAt).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}),
          read: true, // 과거 뉴스는 읽음 처리
          fromAPI: true, isDemo: false,
          isBackfill: true, // 백데이터 표시
        };

        state.alerts.push(alertObj);
        if(maxScore>=45) {
          addToSignalLog(alertObj);
          totalNew++;
        }
      }
      // API 요청 간격
      await new Promise(r=>setTimeout(r,500));
    }
    save();
  }

  saveLearn();
  backfillRunning = false;
  localStorage.setItem('ir_backfill_done', '1'); // 완료 플래그
  if(btn) { btn.style.display='none'; } // 완료 후 버튼 숨김
  if(prog) prog.textContent = `✅ 완료 — 뉴스 ${totalFetched}건 분석, 시그널 ${totalNew}건 추가 (다시 수집 불필요)`;

  // 탭 새로고침
  if(state.currentTab==='sim') renderSim();
  if(state.currentTab==='learn') renderLearnDashboard();
  if(state.currentTab==='filter') renderFilter();
  if(state.currentTab==='news') renderNews();
}

// ── 통합 뉴스 수집 (중복 URL 제거)
async function fetchAllNews(query) {
  const [currents, gnews] = await Promise.all([
    fetchCurrents(query),
    fetchGNewsAPI(query),
  ]);
  // 중복 URL 제거
  const seen = new Set();
  const merged = [];
  for(const art of [...currents, ...gnews]) {
    const key = art.url || art.title;
    if(!seen.has(key)) { seen.add(key); merged.push(art); }
  }
  return merged;
}


async function runNewsCheck() {
  const now = Date.now();
  // Currents 20건/일 기준 — 1시간마다 체크
  if(now - lastNewsCheck < 60*60*1000) return;
  lastNewsCheck = now;
  updateNewsStatus('checking');

  // 인물 분배 전략:
  // Currents (실시간) → 상위 2명 (Trump·Musk)
  // GNews (12시간 지연) → 나머지 인물 (프록시 경유)
  const allFigs = getSortedFigs().filter(f=>f.inf>=65);
  const currFigs = allFigs.slice(0,2);  // Currents 담당
  const gnewsFigs = allFigs.slice(2,6); // GNews 담당
  let newCount = 0;

  // ① Currents — 상위 2명 실시간 수집
  for(const fig of currFigs) {
    const keywords = FIG_KEYWORDS[fig.id]; if(!keywords) continue;
    const checkCount = learnData.figStats[fig.id]?.totalNews||0;
    const query = keywords[checkCount % keywords.length];
    const articles = await fetchCurrents(query);
    newCount += await processArticles(fig, articles, 'Currents');
  }

  // ② GNews 프록시 — 나머지 인물 (지연 있지만 커버리지 확대)
  for(const fig of gnewsFigs) {
    const keywords = FIG_KEYWORDS[fig.id]; if(!keywords) continue;
    const checkCount = learnData.figStats[fig.id]?.totalNews||0;
    const query = keywords[checkCount % keywords.length];
    const articles = await fetchGNewsAPI(query);
    newCount += await processArticles(fig, articles, 'GNews');
  }

  if(state.alerts.length>300) state.alerts=state.alerts.slice(0,300);
  save();
  updateNotifBadge();
  updateNewsStatus(newCount>0?'new':'ok');
  if(state.currentTab==='news') renderNews();
  if(state.currentTab==='radar') renderRadar();
}

// ── 기사 처리 공통 함수
async function processArticles(fig, articles, apiName) {
  let count = 0;
  for(const art of articles.slice(0,2)) {
    const key = art.url&&art.url!=='#' ? art.url : art.title;
    const isNew = art.url==='#'
      ? !state.alerts.find(a=>a.title===art.title&&a.isDemo) // 데모: 제목 기준
      : !state.alerts.find(a=>a.url===art.url);
    if(!isNew && art.url!=='#') continue;

    const combined = (art.title||'')+' '+(art.description||'');
    const sentiment = analyzeSentiment(combined);
    const combined_low = combined.toLowerCase();

    const affectedSectors = Object.entries(SECTOR_KEYWORDS)
      .filter(([,kws])=>kws.some(kw=>combined_low.includes(kw.toLowerCase())))
      .map(([sec])=>sec);

    const estDrop = sentiment<0 ? 12 : 5;
    const oppScores = affectedSectors.flatMap(sec=>{
      const sd=SM[sec]; if(!sd) return [];
      return sd.d.map(s=>({ticker:s.t,score:opp(fig.inf,s.f,estDrop)}));
    }).sort((a,b)=>b.score-a.score);

    const topTickers = oppScores.filter(x=>x.score>=45).map(x=>x.ticker).slice(0,3).join('·');
    const maxScore = oppScores[0]?.score||0;

    // 한국어 번역
    const titleKO = await translateKO(art.title||'');
    const descKO = await translateKO((art.description||'').slice(0,100));

    learnFromNews(fig.id, art, sentiment, affectedSectors);

    const alert = {
      id: Date.now()+Math.random(),
      figureId: fig.id, figureName: fig.name,
      figureColor: fig.color, figureAvatar: fig.avatar,
      title: titleKO,
      titleOrig: art.title,
      desc: descKO,
      source: `${art.source?.name||apiName}`,
      url: art.url, publishedAt: art.publishedAt,
      sectors: affectedSectors, topTickers, maxScore, sentiment,
      sentimentLabel: sentiment<-1?'🔴 부정':sentiment>1?'🟢 긍정':'🟡 중립',
      apiTag: apiName,
      time: new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'}),
      read: false, fromAPI: true, isDemo: false,
    };

    state.alerts.unshift(alert);
    count++;

    // 인앱 배너 + 진동 — isDemo 관계없이 점수 기준
    if(maxScore>=25) {
      const lvl = getSignalLevel(maxScore);
      const lv = SIGNAL_LEVELS[lvl];
      showSignalBanner(lvl, titleKO.slice(0,50)||'새 시그널', `${fig.name} · ${art.source?.name||apiName}`, topTickers);
      if(navigator.vibrate) navigator.vibrate(lv.vibrate);
    }

    // 푸시 알림 — 실제 뉴스만
    if(maxScore>=25 && notifPermission && !alert.isDemo) {
      const lvl = getSignalLevel(maxScore);
      const lv = SIGNAL_LEVELS[lvl];
      new Notification(`${lv.emoji} ${lv.label}`,{
        body: topTickers
          ? `${titleKO.slice(0,50)} | 관련 종목: ${topTickers}`
          : titleKO.slice(0,80),
        tag: lvl, requireInteraction: maxScore>=70,
      });
    }

    // 상세 팝업 — 45점↑ 이면 항상 표시
    if(maxScore>=45) {
      // signalLog에 영구 저장 (alerts 삭제돼도 보존)
      addToSignalLog(alert);
      setTimeout(()=>{
        showSignalDetail(fig, alert, affectedSectors, topTickers, maxScore);
      }, 0);
    }
  }
  return count;
}
function updateNewsStatus(status){
  const dot=document.getElementById('news-status-dot');
  const txt=document.getElementById('news-status-txt');
  if(!dot||!txt) return;
  const total = learnData.newsCount;
  if(status==='checking'){
    dot.style.background='#fbbf24';dot.style.boxShadow='0 0 8px #fbbf24';
    txt.textContent=`뉴스 수집 중... (누적 ${total}건)`;txt.style.color='#fbbf24';
  } else if(status==='new'){
    dot.style.background='#ff4444';dot.style.boxShadow='0 0 8px #ff4444';
    txt.textContent=`새 뉴스 감지! (누적 ${total}건)`;txt.style.color='#ff4444';

  }
}

                  ${bar(st.f,st.f>=70?'#16a34a':st.f>=50?'#fbbf24':'#ef4444',45)}
                </div>`).join('')}
            </div>`;
          }).join('')}

    </div>`;
}

// ── 종목 검색
function renderStocksSearch() {
  const q = (state.tickerSearch||'').toLowerCase().trim();
  const results = document.getElementById('ticker-search-results');
  if(!results) return;
  if(!q) { results.style.display='none'; return; }

  // 전체 종목 풀에서 검색
  const allStocks = Object.entries(SM).flatMap(([sec,sv])=>[
    ...sv.d.map(s=>({...s,secKey:sec,secLabel:sv.label,secColor:sv.color})),
    ...sv.i.map(s=>({...s,secKey:sec,secLabel:sv.label,secColor:sv.color})),
  ]);
  const seen={};
  const unique = allStocks.filter(s=>{
    if(seen[s.t]) return false; seen[s.t]=1; return true;
  });

  const matched = unique.filter(s=>
    s.t.toLowerCase().includes(q) ||
    s.n.toLowerCase().includes(q) ||
    s.secLabel.toLowerCase().includes(q)
  ).slice(0,8);

  if(!matched.length){ results.style.display='none'; return; }

  results.style.display='block';
  results.innerHTML = matched.map(s=>{
    const lp = fmtPrice(s.t);
    return `<div onclick="selectTicker('${s.t}')"
      style="padding:8px 14px;cursor:pointer;border-bottom:1px solid #d0d4e8;
        display:flex;align-items:center;gap:10px;"
      onmouseover="this.style.background='#eff4ff'" onmouseout="this.style.background=''">
      <div style="min-width:55px">
        <div style="font-size:13px;font-weight:bold;color:#2563eb;font-family:var(--mono)">${s.t}</div>
        <div style="font-size:13px;color:#445577">${s.secLabel}</div>
      </div>
      <div style="flex:1;font-size:13px;color:#556677;font-family:sans-serif">${s.n}</div>
      <div style="text-align:right">
        <div style="font-size:12px;color:#1a2340;font-family:var(--mono)">${fmtUSD(lp.price)}</div>
        ${lp.isLive&&lp.change!==0?`<div style="font-size:12px;color:${lp.color}">${lp.arrow}${Math.abs(lp.change)}%</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function selectTicker(ticker) {
  state.tickerSearch = ticker;

  const input = document.getElementById('ticker-search-input');

  if(!learnData.studyStats) learnData.studyStats={totalPredictions:0,totalHits:0,totalCases:0,avgPredError:0,avgTimingError:0,figAccuracy:{},sectorAccuracy:{},probCalibration:0};

  // 학습 기반 전체 종목 점수 계산
  const tickerData = {};
  signalLog.forEach(a=>{
    const tickers = (a.tickers||a.topTickers||'').split('·').filter(Boolean);
    const acc = a.prediction ? calcSignalAccuracy(a) : null;
    tickers.forEach(t=>{
      if(!tickerData[t]) tickerData[t]={
        ticker:t, signals:[], hitCount:0, totalCount:0,
        avgActualDrop:null, drops:[], avgScore:0, scores:[],
        figIds:new Set(), sectors:new Set(),
      };
      const d = tickerData[t];
      d.signals.push(a);
      d.scores.push(a.score||a.maxScore||0);
      if(a.figureId) d.figIds.add(a.figureId);
      (a.sectors||[]).forEach(s=>d.sectors.add(s));
      if(acc?.isPast&&!acc.noData){
        const r = acc.results?.find(r=>r.t===t);
        if(r){
          d.totalCount++;
          if(r.hit) d.hitCount++;
          d.drops.push(r.actualChange);
        }
      }
    });
  });

  // 수익 추적 데이터 결합
  (state.trades||[]).forEach(tr=>{
    if(!tickerData[tr.ticker]) tickerData[tr.ticker]={
      ticker:tr.ticker,signals:[],hitCount:0,totalCount:0,
      avgActualDrop:null,drops:[],scores:[],figIds:new Set(),sectors:new Set()
    };
    if(!tickerData[tr.ticker].trades) tickerData[tr.ticker].trades=[];
    tickerData[tr.ticker].trades.push(tr);
  });

  // 최종 점수 계산
  const ranked = Object.values(tickerData).map(d=>{
    const hitRate = d.totalCount>0 ? Math.round(d.hitCount/d.totalCount*100) : null;
    const avgScore = d.scores.length>0 ? Math.round(d.scores.reduce((s,v)=>s+v,0)/d.scores.length) : 0;
    const avgDrop = d.drops.length>0 ? Math.round(d.drops.reduce((s,v)=>s+v,0)/d.drops.length*10)/10 : null;

function calcSignalAccuracy(a) {
  // 시그널 하나의 예측 정확도 계산
  const pred = a.prediction;
  if(!pred||!pred.tickers?.length) return null;
  const expDate = new Date(pred.expectedDate);
  const isPast = new Date() > expDate;
  if(!isPast) return {isPast:false, daysLeft:Math.round((expDate-new Date())/(1000*60*60*24))};

  const results = pred.tickers.map(t=>{
    const signalPrice = pred.priceAtSignal?.[t]||0;
    const currentPrice = livePrices[t]?.price||PRICES[t]||0;
    if(!signalPrice||!currentPrice) return null;
    const actualChange = Math.round((currentPrice-signalPrice)/signalPrice*1000)/10;
    const predicted = -(pred.avgDrop||10);
    // 예상 매입가 (급락 후 진입 예상가)
    const expectedBuyPrice = Math.round(signalPrice*(1+predicted/100)*100)/100;
    // 차액: 예상 매입가 기준 현재까지 P&L (주당)
    const dollarDiff = Math.round((currentPrice-expectedBuyPrice)*100)/100;
    const dollarDiffPct = expectedBuyPrice>0 ? Math.round(dollarDiff/expectedBuyPrice*1000)/10 : 0;
    // 적중 기준: 방향 맞고 오차 50% 이내
    const sameDir = (actualChange<0&&predicted<0)||(actualChange>0&&predicted>0);
    const hit = sameDir && Math.abs(actualChange-predicted)<=Math.abs(predicted)*0.5;
    return {t,signalPrice,currentPrice,actualChange,predicted,expectedBuyPrice,dollarDiff,dollarDiffPct,hit};
  }).filter(Boolean);

  if(!results.length) return {isPast:true, noData:true};
  const hitCount = results.filter(r=>r.hit).length;
  const hitRate = Math.round(hitCount/results.length*100);
  return {isPast:true, results, hitCount, hitRate, total:results.length};
}

    else lvCounts.MEDIUM++;

}

function createManualSignal(figId, title, sectors, tickers, dropPct) {
  const fig = state.figs.find(f=>f.id===figId);
  if(!fig) return;
  const sc = Math.max(...tickers.split('·').filter(Boolean).map(t=>{
    const allS = Object.values(SM).flatMap(sv=>[...sv.d,...sv.i]);
    const found = allS.find(s=>s.t===t);
    return opp(fig.inf, found?.f||70, dropPct);
  }).concat([0]));
  const alert = {
    id: Date.now()+Math.random(),
    figureId: figId, figureName: fig.name,
    figureColor: fig.color, figureAvatar: fig.avatar,
    title, titleOrig: title,
    source: '직접 입력', url: '#manual',
    sectors: sectors||[], topTickers: tickers,
    tickers, maxScore: sc, score: sc,
    sentiment: -1, sentimentLabel: '🔴 부정',
    apiTag: '수동', isDemo: false, fromAPI: true,
    time: new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'}),
    read: false,
  };
  state.alerts.unshift(alert);
  if(sc>=45) addToSignalLog(alert);
  save(); updateNotifBadge();
  if(sc>=45) {
    const lvl = getSignalLevel(sc);
    showSignalBanner(lvl, title.slice(0,50), fig.name, tickers);
    setTimeout(()=>showSignalDetail(fig,alert,sectors,tickers,sc), 0);
  }
  return alert;
}

// ③ 매도 알림 — 기일 도래 시 자동 체크
// ═══════════════════════════════════════
function checkSellAlerts() {
  const now = new Date();
  signalLog.forEach(a=>{
    if(!a.prediction||a._sellAlerted) return;
    const expDate = new Date(a.prediction.expectedDate);
    const diffHours = (expDate-now)/(1000*60*60);
    // 24시간 전 경고
    if(diffHours<=24 && diffHours>0) {
      const tk = a.tickers||a.topTickers||'';
      pushNotif(`⏰ 매도 기일 임박 — ${a.figureName}`,
        `예상 기일까지 ${Math.round(diffHours)}시간 | ${tk}`,0,'');
      showSignalBanner('HIGH',`매도 기일 임박: ${tk}`,
        `${a.figureName} · 예상 기일 ${expDate.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}`,tk);
      a._sellAlerted = 'warning';
      saveSignalLog();
    }
    // 기일 도래
    if(diffHours<=0 && a._sellAlerted!=='due') {
      const tk = a.tickers||a.topTickers||'';
      pushNotif(`🎯 매도 기일 도달 — ${a.figureName}`,
        `목표 기일 도달! 청산 여부 확인 | ${tk}`,70,tk);
      a._sellAlerted = 'due';
      saveSignalLog();
      // 자동 평가 기록
      const acc = calcSignalAccuracy(a);
      if(acc?.isPast&&!acc.noData) recordStudyResult(a,acc);
    }
  });
}

function addTrade() {
  const ticker = (document.getElementById('trade-ticker')?.value||'').toUpperCase().trim();
  const entry = parseFloat(document.getElementById('trade-entry')?.value||0);
  const shares = parseInt(document.getElementById('trade-shares')?.value||0);
  const target = parseFloat(document.getElementById('trade-target')?.value||0)||null;
  const sigIdx = document.getElementById('trade-signal')?.value;
  if(!ticker||!entry||!shares) { alert('종목·매입가·수량을 입력하세요'); return; }
  const trade = {
    id: Date.now(),
    ticker, entry, shares, target,
    cost: Math.round(entry*shares*100)/100,
    status: 'open',
    signalRef: sigIdx?signalLog[+sigIdx]?.id:null,
    openedAt: new Date().toLocaleDateString('ko-KR'),
  };
  state.trades.unshift(trade);
  save();
  renderTrade();
  // 학습 연결
  if(sigIdx&&signalLog[+sigIdx]) {
    signalLog[+sigIdx]._tradeId = trade.id;
    saveSignalLog();
  }
}

function closeTrade(idx) {
  const open = state.trades.filter(t=>t.status==='open');
  const trade = open[idx];
  if(!trade) return;
  const exitPrice = parseFloat(prompt(`${trade.ticker} 청산가 입력 ($)`, livePrices[trade.ticker]?.price||trade.entry)||0);
  if(!exitPrice) return;
  const realIdx = state.trades.indexOf(trade);
  state.trades[realIdx].status = 'closed';
  state.trades[realIdx].exit = exitPrice;
  state.trades[realIdx].pnl = Math.round((exitPrice-trade.entry)*trade.shares*100)/100;
  state.trades[realIdx].pnlPct = Math.round((exitPrice-trade.entry)/trade.entry*1000)/10;
  state.trades[realIdx].closedAt = new Date().toLocaleDateString('ko-KR');
  save();
  // 학습 반영
  recordTradeResult(state.trades[realIdx]);
  renderTrade();
}

function recordTradeResult(trade) {
  if(!learnData.studyStats) learnData.studyStats={totalPredictions:0,totalHits:0,totalCases:0,avgPredError:0,avgTimingError:0,figAccuracy:{},sectorAccuracy:{},probCalibration:0};
  const ss = learnData.studyStats;
  if(!ss.tradeResults) ss.tradeResults = [];
  ss.tradeResults.unshift({
    ticker: trade.ticker,
    entry: trade.entry, exit: trade.exit,
    pnl: trade.pnl, pnlPct: trade.pnlPct,
    date: trade.closedAt,
  });
  if(ss.tradeResults.length>100) ss.tradeResults=ss.tradeResults.slice(0,100);
  saveLearn();
}

function renderHistory() {
  // 종목별 시그널 반응 집계
  const tickerMap = {};
  signalLog.forEach(a=>{
    const tickers = (a.tickers||a.topTickers||'').split('·').filter(Boolean);
    tickers.forEach(t=>{
      if(!tickerMap[t]) tickerMap[t]={ticker:t,signals:[],hitCount:0,totalCount:0,avgDrop:0};
      tickerMap[t].signals.push(a);
      if(a.prediction) {
        const acc = calcSignalAccuracy(a);
        if(acc?.isPast&&!acc.noData) {
          tickerMap[t].totalCount++;
          const r = acc.results?.find(r=>r.t===t);
          if(r?.hit) tickerMap[t].hitCount++;
          if(r) tickerMap[t].avgDrop = Math.round(
            ((tickerMap[t].avgDrop*(tickerMap[t].totalCount-1))+(r.actualChange||0))/
            tickerMap[t].totalCount*10)/10;
        }
      }
    });
  });

  // 수익 추적과도 연결
  state.trades.forEach(t=>{
    if(!tickerMap[t.ticker]) tickerMap[t.ticker]={ticker:t.ticker,signals:[],hitCount:0,totalCount:0,avgDrop:0};
    if(!tickerMap[t.ticker].trades) tickerMap[t.ticker].trades=[];
    tickerMap[t.ticker].trades.push(t);

  const searchVal = state.histSearch||'';

function submitManualSignal() {
  const figId = parseInt(document.getElementById('msig-fig')?.value)||1;
  const title = document.getElementById('msig-title')?.value?.trim();
  const tickers = document.getElementById('msig-tickers')?.value?.trim()||'';
  const drop = parseFloat(document.getElementById('msig-drop')?.value)||10;
  if(!title) { alert('발언 내용을 입력하세요'); return; }
  // 섹터 자동 감지
  const sectors = Object.entries(SECTOR_KEYWORDS)
    .filter(([,kws])=>kws.some(kw=>title.toLowerCase().includes(kw.toLowerCase())||
      tickers.toLowerCase().includes(kw.toLowerCase())))
    .map(([s])=>s);
  createManualSignal(figId, title, sectors, tickers, drop);
}

function renderLearnDashboard() {

  const ss = learnData.studyStats;
  const overall = ss.totalCases>0 ? Math.round(ss.totalHits/ss.totalCases*100) : null;
  const overallColor = overall>=70?'#16a34a':overall>=40?'#fbbf24':'#dc2626';

  // 인물별 적중률
  const figStats = Object.entries(ss.figAccuracy||{})
    .map(([id,fa])=>{
      const fig = state.figs.find(f=>f.id===+id);
      const rate = fa.cases>0?Math.round(fa.hits/fa.cases*100):null;
      return {id:+id, fig, rate, hits:fa.hits, cases:fa.cases};
    })
    .filter(x=>x.fig&&x.cases>0)
    .sort((a,b)=>b.cases-a.cases);

  // 섹터별 적중률
  const secStats = Object.entries(ss.sectorAccuracy||{})
    .map(([sec,sa])=>{
      const sd = SM[sec];
      const rate = sa.cases>0?Math.round(sa.hits/sa.cases*100):null;
      return {sec, sd, rate, hits:sa.hits, cases:sa.cases};

    .filter(x=>x.sd&&x.cases>0)

    tickerPnl[t.ticker].pnl += t.pnl||0;

// A. 학습 기반 종목 추천 엔진
// C. 유사 패턴 감지 엔진
// ═══════════════════════════════════════
function generateRecommendations() {
  const ss = learnData.studyStats;

  // ── A. 종목 추천: 시그널 빈도 + 적중률 + 현재 영향력 결합
  const tickerScore = {};
  signalLog.forEach(a=>{
    const tickers = (a.tickers||a.topTickers||'').split('·').filter(Boolean);
    const acc = a.prediction ? calcSignalAccuracy(a) : null;
    tickers.forEach(t=>{
      if(!tickerScore[t]) tickerScore[t]={freq:0,hits:0,total:0,scores:[],drops:[]};
      tickerScore[t].freq++;
      tickerScore[t].scores.push(a.score||a.maxScore||0);
      if(acc?.isPast&&!acc.noData) {
        const r = acc.results?.find(r=>r.t===t);
        if(r) {
          tickerScore[t].total++;
          if(r.hit) tickerScore[t].hits++;
          tickerScore[t].drops.push(r.actualChange);
        }
      }
    });
  });

  const stockRecs = Object.entries(tickerScore)
    .filter(([,d])=>d.freq>=2)
    .map(([ticker,d])=>{
      const hitRate = d.total>0?Math.round(d.hits/d.total*100):null;
      const avgScore = d.scores.reduce((s,v)=>s+v,0)/d.scores.length;
      const avgDrop = d.drops.length>0?Math.round(d.drops.reduce((s,v)=>s+v,0)/d.drops.length*10)/10:null;
      // 추천 점수: 빈도×30 + 기회점수×40 + 적중률×30
      const rec = Math.round(
        (d.freq/signalLog.length*100)*0.3 +
        (avgScore/100)*0.4*100 +
        (hitRate||50)*0.3
      );
      const reasons = [];
      if(hitRate>=70) reasons.push(`적중률 ${hitRate}%`);
      if(avgScore>=60) reasons.push(`평균 기회점수 ${Math.round(avgScore)}`);
      if(d.freq>=3) reasons.push(`${d.freq}회 시그널`);
      return {ticker, score:rec, scoreColor:rec>=70?'#16a34a':rec>=50?'#fbbf24':'#dc2626',
        reason:reasons.join(' · ')||'누적 데이터 기반', hitRate, avgDrop};
    })
    .sort((a,b)=>b.score-a.score)
    .slice(0,5);

  // ── C. 유사 패턴 감지: 최근 시그널과 과거 유사 사례
  const recentSignal = signalLog[0];
  const similarPatterns = [];

  if(recentSignal) {
    const recentFigId = recentSignal.figureId;
    const recentSectors = recentSignal.sectors||[];
    const recentScore = recentSignal.score||recentSignal.maxScore||0;

    signalLog.slice(1).forEach(past=>{
      if(!past.prediction) return;
      const acc = calcSignalAccuracy(past);
      if(!acc?.isPast||acc.noData) return;

      // 유사도 계산
      let sim = 0;
      if(past.figureId===recentFigId) sim+=40; // 같은 인물
      const secOverlap = (past.sectors||[]).filter(s=>recentSectors.includes(s)).length;
      sim += Math.min(40, secOverlap*20); // 섹터 겹침
      const scoreDiff = Math.abs((past.score||past.maxScore||0)-recentScore);
      sim += Math.max(0, 20-scoreDiff/5); // 점수 유사도

      if(sim<40) return; // 40% 미만 제외

      const fig = state.figs.find(f=>f.id===past.figureId);
      const avgActualDrop = acc.results?.length>0
        ? Math.round(acc.results.reduce((s,r)=>s+r.actualChange,0)/acc.results.length*10)/10
        : null;
      const pat = PATTERNS[past.figureId];

      similarPatterns.push({
        title: past.title?.slice(0,60)||'',
        date: past.time||'',
        similarity: Math.round(sim),
        fig,
        hitRate: acc.hitRate,
        avgActualDrop,
        recoveryDays: past.prediction?.recoveryDays,
        insight: hitRate2insight(acc.hitRate, avgActualDrop, past.prediction?.recoveryDays),
      });
    });
    similarPatterns.sort((a,b)=>b.similarity-a.similarity);
  }

  return { stockRecs, similarPatterns: similarPatterns.slice(0,3) };
}

function hitRate2insight(hitRate, avgDrop, days) {
  if(hitRate>=70 && avgDrop<0)
    return `과거 유사 패턴에서 ${Math.abs(avgDrop||0)}% 하락 후 ${days||7}일 내 회복 — 진입 유효`;
  if(hitRate>=70 && avgDrop>0)
    return `과거 유사 패턴에서 예상과 달리 상승 — 매도 포지션 주의`;
  if(hitRate<40)
    return `과거 유사 패턴 적중률 낮음 (${hitRate}%) — 소액 분할매수 권장`;
  return `과거 유사 패턴 적중률 ${hitRate}% — 패턴 참고하되 리스크 관리 필수`;
}

  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode:standalone)').matches;
  const shown = localStorage.getItem('ir_install_shown');

  if(isMobile && !isStandalone && !shown) {
    localStorage.setItem('ir_install_shown', '1');
    // 5초 후 안내 표시
    setTimeout(() => {
      const btn = document.getElementById('install-btn');
      if(btn) {
        btn.style.display = 'flex';
        // 버튼 강조 애니메이션
        btn.style.animation = 'installPulse 1s ease 3';
      }
      // iOS는 자동으로 안내 팝업
      if(/iPad|iPhone|iPod/.test(navigator.userAgent)) {
        showIOSGuide();
      }
    }, 5000);
  }
}

window.onload = function(){
  // 저장된 GNews 키 로드
  const savedKey = localStorage.getItem('ir_gnews_key');
  if(savedKey) {
    // GNEWS_KEY 변수 업데이트 (런타임)
    window._gnewsKey = savedKey;
  }
  // Service Worker 등록 (HTTPS + GitHub Pages에서만 작동)
  if('serviceWorker' in navigator && location.protocol==='https:' && !location.hostname.includes('claudeusercontent')) {
    navigator.serviceWorker.register('./firebase-messaging-sw.js')
      .then(reg => {
        console.log('✅ SW 등록:', reg.scope);
        localStorage.setItem('ir_sw_ready','1');
        const fbSt = document.getElementById('fb-status');
        if(fbSt){ fbSt.textContent='🔥 FB+FCM 완료'; fbSt.style.color='#16a34a'; }
      })
      .catch(err => {
        // 미리보기 환경에서는 정상 — 무시
        if(!location.hostname.includes('claudeusercontent')) {
          console.warn('SW 등록 실패:', err);
        }
      });
  }

  // FCM 자동 초기화 (알림 허용된 경우)
  setTimeout(()=>{
    if(window.fbReady && window.fbInitFCM && notifPermission) {
      window.fbInitFCM();
    }
  }, 4000);

  // 실시간 현재가 업데이트 (15분마다)
  updateAllPrices().then(()=>{\
    if(state.currentTab==='filter') renderFilter();
    if(state.currentTab==='stocks') renderStocks();
  });
  setInterval(()=>{
    updateAllPrices().then(()=>{
      if(state.currentTab==='filter') renderFilter();
      if(state.currentTab==='stocks') renderStocks();
    });
  }, 15*60*1000);

  // ── 자동 결과 추적 (앱 시작 3초 후 + 6시간마다)
  setTimeout(() => autoTrackResults(true), 3000);
  setInterval(() => autoTrackResults(true), 6*60*60*1000);

  updateClock();
  setInterval(updateClock, 10000);
  buildDesktopNav();
  updateNotifBadge();
  startMonitor();
  renderRadar();
  checkInstallPrompt();
  initNotifPermission();

  // Firebase 상태 표시
  setTimeout(()=>{
    const fbSt = document.getElementById('fb-status');
    if(!fbSt) return;
    const swReady = localStorage.getItem('ir_sw_ready');
    if(window.fbReady && swReady) {
      fbSt.textContent='🔥 FB+FCM 완료'; fbSt.style.color='#16a34a';
    } else if(window.fbReady) {
      fbSt.textContent='🔥 FB 연결됨'; fbSt.style.color='#16a34a';
    }
  }, 3500);

  // Firebase 데이터 로드 + 실시간 동기화
  setTimeout(async () => {
    if(!window.fbLoad) return;

    const fbData = await window.fbLoad();
    if(fbData) {
      // 시그널 기록 복원 (Firebase가 더 많으면)
      if((fbData.signalLog||[]).length > signalLog.length) {
        signalLog = fbData.signalLog;
        localStorage.setItem('ir_signal_log', JSON.stringify(signalLog));
        console.log(`✅ 시그널 기록 ${signalLog.length}건 복원`);
      }
      // 수익 추적 복원
      if((fbData.trades||[]).length > (state.trades||[]).length) {
        state.trades = fbData.trades;
        localStorage.setItem('ir_trades', JSON.stringify(state.trades));
        console.log(`✅ 수익 추적 ${state.trades.length}건 복원`);
      }

      // 발언 로그 — Firebase가 더 많으면 덮어씀
      if((fbData.logs||[]).length > state.logs.length) {
        state.logs = fbData.logs;
        localStorage.setItem('ir_logs', JSON.stringify(state.logs));
      }

      // 뉴스 알림 — URL 기준으로 병합 (중복 제거)
      if((fbData.alerts||[]).length > 0) {
        const localUrls = new Set(state.alerts.map(a=>a.url||a.id));
        const newFromFB = (fbData.alerts||[]).filter(a=>!localUrls.has(a.url||a.id));
        if(newFromFB.length > 0) {
          state.alerts = [...newFromFB, ...state.alerts]
            .sort((a,b)=>b.id-a.id)
            .slice(0,200);
          localStorage.setItem('ir_alerts', JSON.stringify(state.alerts));
          updateNotifBadge();
          // 새 시그널 있으면 배너 표시
          const newSignals = newFromFB.filter(a=>a.fromAPI&&(a.score||a.maxScore||0)>=45);
          if(newSignals.length>0) {
            const s = newSignals[0];
            const lvl = getSignalLevel(s.score||s.maxScore||45);
            showSignalBanner(lvl, s.title?.slice(0,50)||'', s.figureName||'', s.tickers||s.topTickers||'');
          }
          console.log(`✅ Firebase에서 새 뉴스 ${newFromFB.length}건 동기화`);
        }
      }

      // 누적 학습 — 더 많이 학습된 쪽 사용
      if((fbData.learnData?.newsCount||0) > learnData.newsCount) {
        learnData = fbData.learnData;
        localStorage.setItem('ir_learn', JSON.stringify(learnData));
      }

      renderRadar();
      updateNotifBadge();
      updateNewsStatus('ok');
    }

    // 실시간 동기화 — 다른 기기에서 뉴스 수집 시 즉시 반영
    if(window.fbListen) {
      window.fbListen((data) => {
        // 발언 로그 업데이트
        if((data.logs||[]).length > state.logs.length) {
          state.logs = data.logs;
          localStorage.setItem('ir_logs', JSON.stringify(state.logs));
          if(state.currentTab==='log') renderLog();
        }

        // 뉴스 알림 실시간 병합
        if((data.alerts||[]).length > 0) {
          const localUrls = new Set(state.alerts.map(a=>a.url||a.id));
          const newFromFB = (data.alerts||[]).filter(a=>!localUrls.has(a.url||a.id));
          if(newFromFB.length > 0) {
            state.alerts = [...newFromFB, ...state.alerts]
              .sort((a,b)=>b.id-a.id)
              .slice(0,200);
            localStorage.setItem('ir_alerts', JSON.stringify(state.alerts));
            updateNotifBadge();

            // 새 시그널 배너 + 팝업
            const newSignals = newFromFB.filter(a=>a.fromAPI&&(a.score||a.maxScore||0)>=45);
            for(const s of newSignals.slice(0,1)) {
              const sc = s.score||s.maxScore||45;
              const lvl = getSignalLevel(sc);
              showSignalBanner(lvl, s.title?.slice(0,50)||'', s.figureName||'', s.tickers||s.topTickers||'');
              // 상세 팝업
              const fig = state.figs.find(f=>f.id===s.figureId);
              if(fig) {
                setTimeout(()=>{
                  showSignalDetail(fig, s, s.sectors||[], s.tickers||s.topTickers||'', sc);
                }, 0);
              }
            }

            if(state.currentTab==='news') renderNews();
            console.log(`🔄 실시간 동기화: 새 뉴스 ${newFromFB.length}건`);
          }
        }

        // 누적 학습 동기화
        if((data.learnData?.newsCount||0) > learnData.newsCount) {
          learnData = data.learnData;
          localStorage.setItem('ir_learn', JSON.stringify(learnData));
        }
      });
    }
  }, 2000);
};
</script>
